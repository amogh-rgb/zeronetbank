<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroNetBank | User Portal</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #6366f1;
            --gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            color: #e2e8f0;
        }
        
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--gradient);
        }
        
        .auth-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
        }
        
        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-logo i {
            font-size: 48px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .auth-logo h1 {
            color: #1e293b;
            font-size: 24px;
            margin-top: 10px;
        }
        
        .form-step { display: none; }
        .form-step.active { display: block; }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 600;
            font-size: 14px;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }
        
        .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            background: #f9fafb;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        .btn-secondary {
            background: transparent;
            border: 2px solid #e5e7eb;
            color: #374151;
        }
        
        .alert {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert.show { display: block; }
        .alert.error { background: #fee2e2; color: #991b1b; }
        .alert.success { background: #d1fae5; color: #065f46; }
        
        .auth-links {
            text-align: center;
            margin-top: 20px;
        }
        
        .auth-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }
        
        .dashboard { display: none; }
        
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100vh;
            background: #1e293b;
            padding: 25px 0;
        }
        
        .sidebar-logo {
            padding: 0 25px 25px;
            border-bottom: 1px solid #334155;
        }
        
        .sidebar-logo h2 {
            color: white;
            font-size: 20px;
        }
        
        .nav-menu { padding: 25px 15px; }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 18px;
            color: #94a3b8;
            border-radius: 10px;
            margin-bottom: 6px;
            cursor: pointer;
        }
        
        .nav-item:hover, .nav-item.active {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }
        
        .main-content {
            margin-left: 260px;
            padding: 25px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid #334155;
        }
        
        .stat-card h3 {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
        }
        
        .transactions-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 16px;
            border: 1px solid #334155;
            padding: 25px;
        }
        
        .transactions-card h3 {
            margin-bottom: 20px;
        }
        
        .transaction-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #334155;
        }
        
        .transaction-item:last-child { border-bottom: none; }
        
        .transaction-info h4 { color: white; font-size: 15px; }
        .transaction-info p { color: #94a3b8; font-size: 13px; }
        
        .transaction-amount { font-size: 16px; font-weight: 600; }
        .transaction-amount.credit { color: #10b981; }
        .transaction-amount.debit { color: #ef4444; }
    </style>
</head>
<body>
    <!-- Auth Container -->
    <div id="authContainer" class="auth-container">
        <div class="auth-box">
            
            <!-- Mobile Login -->
            <div id="mobileLogin" class="form-step active">
                <div class="auth-logo">
                    <i class="fas fa-mobile-alt"></i>
                    <h1>Enter Mobile Number</h1>
                </div>
                <div id="loginAlert" class="alert"></div>
                
                <div class="input-group">
                    <label>Mobile Number</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="mobileNumber" placeholder="Enter your mobile number">
                    </div>
                </div>
                
                <button class="btn" onclick="checkMobile()">
                    <i class="fas fa-arrow-right"></i> Continue
                </button>
            </div>
            
            <!-- Register New User -->
            <div id="registerForm" class="form-step">
                <div class="auth-logo">
                    <i class="fas fa-user-plus"></i>
                    <h1>Create Account</h1>
                </div>
                <div id="registerAlert" class="alert"></div>
                
                <div class="input-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="regName" placeholder="Your full name">
                    </div>
                </div>
                
                <div class="input-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="regEmail" placeholder="Your email">
                    </div>
                </div>
                
                <div class="input-group">
                    <label>Mobile</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="regMobile" readonly>
                    </div>
                </div>
                
                <button class="btn" onclick="registerUser()">
                    <i class="fas fa-check"></i> Create Account
                </button>
                
                <button class="btn btn-secondary" onclick="backToMobile()">
                    <i class="fas fa-arrow-left"></i> Back
                </button>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <h2><i class="fas fa-shield-alt"></i> ZeroNetBank</h2>
            </div>
            <nav class="nav-menu">
                <a class="nav-item active"><i class="fas fa-home"></i><span>Dashboard</span></a>
                <a class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="header">
                <h1>Welcome, <span id="userName">User</span>!</h1>
                <button class="btn" onclick="logout()" style="width: auto; padding: 10px 20px;">Logout</button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Current Balance</h3>
                    <div class="value" id="userBalance">$0.00</div>
                </div>
                <div class="stat-card">
                    <h3>Total Transactions</h3>
                    <div class="value" id="userTransactions">0</div>
                </div>
                <div class="stat-card">
                    <h3>Account Status</h3>
                    <div class="value" style="color: #10b981;">Active</div>
                </div>
            </div>

            <div class="transactions-card">
                <h3><i class="fas fa-history"></i> Recent Transactions</h3>
                <div id="transactionList">
                    <p style="color: #94a3b8; text-align: center; padding: 20px;">No transactions yet</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = window.location.origin;
        let currentUser = null;
        
        // Check if mobile exists
        async function checkMobile() {
            const mobile = document.getElementById('mobileNumber').value;
            const alert = document.getElementById('loginAlert');
            
            if (!mobile) {
                alert.className = 'alert error show';
                alert.textContent = 'Please enter mobile number';
                return;
            }
            
            try {
                // Try to find user by mobile (using profile API with mobile as email for now)
                const res = await fetch(`${API_URL}/api/users/profile/${mobile}`);
                const data = await res.json();
                
                if (data.success) {
                    // User exists - login
                    currentUser = data.user;
                    showDashboard();
                } else {
                    // User doesn't exist - show register
                    document.getElementById('regMobile').value = mobile;
                    document.getElementById('mobileLogin').classList.remove('active');
                    document.getElementById('registerForm').classList.add('active');
                }
            } catch (error) {
                alert.className = 'alert error show';
                alert.textContent = 'Error checking mobile number';
            }
        }
        
        // Register new user
        async function registerUser() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const mobile = document.getElementById('regMobile').value;
            const alert = document.getElementById('registerAlert');
            
            if (!name || !email || !mobile) {
                alert.className = 'alert error show';
                alert.textContent = 'Please fill all fields';
                return;
            }
            
            try {
                const res = await fetch(`${API_URL}/api/users/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name,
                        email,
                        mobile,
                        password: mobile // Use mobile as password (simple auth)
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    currentUser = data.user;
                    showDashboard();
                } else {
                    alert.className = 'alert error show';
                    alert.textContent = data.message || 'Registration failed';
                }
            } catch (error) {
                alert.className = 'alert error show';
                alert.textContent = 'Error registering';
            }
        }
        
        function backToMobile() {
            document.getElementById('registerForm').classList.remove('active');
            document.getElementById('mobileLogin').classList.add('active');
        }
        
        function showDashboard() {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            
            document.getElementById('userName').textContent = currentUser.name;
            document.getElementById('userBalance').textContent = '$' + parseFloat(currentUser.balance).toFixed(2);
            
            loadTransactions();
        }
        
        async function loadTransactions() {
            try {
                const res = await fetch(`${API_URL}/api/users/transactions/${currentUser.email}`);
                const data = await res.json();
                
                if (data.success && data.transactions.length > 0) {
                    document.getElementById('userTransactions').textContent = data.transactions.length;
                    renderTransactions(data.transactions);
                } else {
                    document.getElementById('userTransactions').textContent = '0';
                }
            } catch (error) {
                console.error('Error loading transactions:', error);
            }
        }
        
        function renderTransactions(transactions) {
            const list = document.getElementById('transactionList');
            list.innerHTML = transactions.slice(0, 5).map(t => {
                const isCredit = t.to === currentUser.email;
                const amountClass = isCredit ? 'credit' : 'debit';
                const sign = isCredit ? '+' : '-';
                
                return `
                    <div class="transaction-item">
                        <div class="transaction-info">
                            <h4>${t.type}</h4>
                            <p>${new Date(t.timestamp).toLocaleDateString()}</p>
                        </div>
                        <div class="transaction-amount ${amountClass}">
                            ${sign}$${parseFloat(t.amount).toFixed(2)}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function logout() {
            currentUser = null;
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('authContainer').style.display = 'flex';
            document.getElementById('mobileLogin').classList.add('active');
            document.getElementById('registerForm').classList.remove('active');
            document.getElementById('mobileNumber').value = '';
        }
    </script>
</body>
</html>
