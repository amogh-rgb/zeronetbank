<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroNetPay Admin Dashboard - Testing Mode</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #6366f1;
            font-size: 2.5em;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .stat-card h3 {
            color: #94a3b8;
            margin-bottom: 10px;
        }
        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #6366f1;
        }
        .users-section {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .users-section h2 {
            margin-bottom: 20px;
            color: #6366f1;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        th {
            background: rgba(99,102,241,0.1);
            color: #e2e8f0;
        }
        .action-btn {
            padding: 6px 12px;
            margin: 2px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
        .add-btn { background: #22c55e; color: white; }
        .remove-btn { background: #ef4444; color: white; }
        .loading { text-align: center; padding: 40px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏦 ZeroNetPay Admin Dashboard</h1>
        <p>Testing Mode - Direct Access</p>
    </div>

    <div class="stats">
        <div class="stat-card">
            <h3>Total Users</h3>
            <div class="value" id="totalUsers">Loading...</div>
        </div>
        <div class="stat-card">
            <h3>Total Transactions</h3>
            <div class="value" id="totalTransactions">Loading...</div>
        </div>
        <div class="stat-card">
            <h3>Total Balance</h3>
            <div class="value" id="totalBalance">Loading...</div>
        </div>
        <div class="stat-card">
            <h3>Active Users</h3>
            <div class="value" id="activeUsers">Loading...</div>
        </div>
    </div>

    <div class="users-section">
        <h2>Registered Users</h2>
        <div id="usersTable">
            <div class="loading">Loading users...</div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        // Load dashboard data
        async function loadDashboard() {
            try {
                // Load stats
                const statsRes = await fetch(`${API_URL}/api/admin/dashboard`);
                const stats = await statsRes.json();

                if (stats.success) {
                    document.getElementById('totalUsers').textContent = stats.stats.totalUsers;
                    document.getElementById('totalTransactions').textContent = stats.stats.totalTransactions;
                    document.getElementById('totalBalance').textContent = '$' + stats.stats.totalBalance;
                    document.getElementById('activeUsers').textContent = stats.stats.activeUsers;
                }

                // Load users
                const usersRes = await fetch(`${API_URL}/api/admin/users`);
                const usersData = await usersRes.json();

                if (usersData.success) {
                    displayUsers(usersData.users);
                }

            } catch (error) {
                console.error('Dashboard load error:', error);
            }
        }

        function displayUsers(users) {
            const html = `
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Balance</th>
                            <th>Transactions</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${users.map(user => `
                            <tr>
                                <td>${user.id.substring(0, 8)}...</td>
                                <td>${user.displayName || 'N/A'}</td>
                                <td>${user.email}</td>
                                <td>${user.phone || 'N/A'}</td>
                                <td>$${parseFloat(user.balance).toFixed(2)}</td>
                                <td>${user.transactionCount}</td>
                                <td>
                                    <button class="action-btn add-btn" onclick="manageMoney('${user.id}', '${user.email}', 'add')">
                                        Add Money
                                    </button>
                                    <button class="action-btn remove-btn" onclick="manageMoney('${user.id}', '${user.email}', 'remove')">
                                        Remove Money
                                    </button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('usersTable').innerHTML = html;
        }

        async function manageMoney(userId, userEmail, action) {
            const amount = prompt(`Enter amount to ${action} for ${userEmail}:`);
            if (!amount || isNaN(amount)) return;

            const reason = prompt('Reason:') || `${action} by admin`;

            try {
                const endpoint = action === 'add' ? '/api/admin/add-money' : '/api/admin/remove-money';
                const res = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, amount: parseFloat(amount), reason })
                });

                const result = await res.json();
                if (result.success) {
                    alert(`Successfully ${action}ed $${amount}`);
                    loadDashboard(); // Refresh data
                } else {
                    alert(result.message || `Failed to ${action} money`);
                }
            } catch (error) {
                console.error('Money management error:', error);
                alert(`Failed to ${action} money`);
            }
        }

        // Load dashboard on page load
        loadDashboard();
    </script>
</body>
</html>
