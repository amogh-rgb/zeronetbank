<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroNetBank - Admin Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 16px; }
        .content {
            padding: 40px;
        }
        .login-form {
            max-width: 400px;
            margin: 0 auto;
            background: #f8fafc;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .dashboard {
            display: none;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-card h3 {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ZeroNetBank</h1>
            <p>Admin Dashboard</p>
        </div>
        
        <div class="content">
            <!-- Login Form -->
            <div id="loginSection" class="login-form">
                <h2 style="text-align: center; margin-bottom: 25px; color: #333;">Admin Login</h2>
                
                <div class="form-group">
                    <label for="email">Admin Email</label>
                    <input type="email" id="email" value="admin@zeronetpay.com" readonly>
                </div>
                
                <div class="form-group">
                    <label for="otp">OTP Code</label>
                    <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6">
                </div>
                
                <button class="btn" id="sendOTPBtn" onclick="sendOTP()">Send OTP</button>
                <button class="btn" id="loginBtn" onclick="login()" style="display: none; margin-top: 10px;">Login</button>
                
                <div id="status" class="status"></div>
            </div>
            
            <!-- Dashboard -->
            <div id="dashboardSection" class="dashboard">
                <h2 style="margin-bottom: 25px; color: #333;">Dashboard Overview</h2>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Users</h3>
                        <div class="value" id="totalUsers">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Transactions</h3>
                        <div class="value" id="totalTransactions">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Balance</h3>
                        <div class="value" id="totalBalance">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>Active Users</h3>
                        <div class="value" id="activeUsers">0</div>
                    </div>
                </div>
                
                <button class="btn" onclick="logout()" style="width: auto; padding: 12px 30px;">Logout</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        
        async function sendOTP() {
            const btn = document.getElementById('sendOTPBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.textContent = 'Sending...';
            
            try {
                const response = await fetch(`${API_URL}/api/otp/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        identifier: 'admin@zeronetpay.com',
                        type: 'admin'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    status.className = 'status success';
                    status.textContent = `OTP sent! For testing: ${data.otp}`;
                    document.getElementById('sendOTPBtn').style.display = 'none';
                    document.getElementById('loginBtn').style.display = 'block';
                } else {
                    status.className = 'status error';
                    status.textContent = data.message || 'Failed to send OTP';
                }
            } catch (error) {
                status.className = 'status error';
                status.textContent = 'Network error. Please try again.';
            }
            
            btn.disabled = false;
            btn.textContent = 'Send OTP';
        }
        
        async function login() {
            const otp = document.getElementById('otp').value;
            const status = document.getElementById('status');
            
            if (!otp || otp.length !== 6) {
                status.className = 'status error';
                status.textContent = 'Please enter 6-digit OTP';
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/api/otp/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        identifier: 'admin@zeronetpay.com',
                        otp: otp
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('dashboardSection').style.display = 'block';
                    loadDashboard();
                } else {
                    status.className = 'status error';
                    status.textContent = data.message || 'Invalid OTP';
                }
            } catch (error) {
                status.className = 'status error';
                status.textContent = 'Network error. Please try again.';
            }
        }
        
        async function loadDashboard() {
            try {
                const response = await fetch(`${API_URL}/api/admin/dashboard`);
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('totalUsers').textContent = data.stats.totalUsers;
                    document.getElementById('totalTransactions').textContent = data.stats.totalTransactions;
                    document.getElementById('totalBalance').textContent = data.stats.totalBalance;
                    document.getElementById('activeUsers').textContent = data.stats.activeUsers;
                }
            } catch (error) {
                console.error('Failed to load dashboard:', error);
            }
        }
        
        function logout() {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('dashboardSection').style.display = 'none';
            document.getElementById('sendOTPBtn').style.display = 'block';
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('otp').value = '';
            document.getElementById('status').style.display = 'none';
        }
    </script>
</body>
</html>
