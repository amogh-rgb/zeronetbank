# Render.com deployment configuration for ZeroNetBank
# Free tier compatible

services:
  - type: web
    name: zeronetbank
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: zeronetbank-db
          property: connectionString
      - key: ADMIN_API_TOKEN
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true

databases:
  - name: zeronetbank-db
    databaseName: zeronetbank
    user: zeronetbank
    plan: free
