# Render.com deployment configuration for ZeroNetBank
# Place this file in the bank/ folder root

services:
  # Web Service - The Bank API
  - type: web
    name: zeronetbank
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: zeronetbank-db
          property: connectionString
      - key: ADMIN_API_TOKEN
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true

  # Background Worker (optional - for processing)
  - type: worker
    name: zeronetbank-worker
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run worker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zeronetbank-db
          property: connectionString

databases:
  - name: zeronetbank-db
    databaseName: zeronetbank
    user: zeronetbank
    plan: free
